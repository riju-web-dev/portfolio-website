
<!DOCTYPE html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<html>
<head>
    <title>Create Account</title>

    <style>
        body {
            margin: 0;
            padding: 10px;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 90%;
            max-width: 350px;
        }

        h2 {
            margin-bottom: 20px;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 10px;
            font-size: 14px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
        }

        /* Gender section */
        .gender-options {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .gender-options label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }
.back-btn {
    display: inline-block;
    margin-bottom: 15px;
    text-decoration: none;
    color: #667eea;
    font-size: 14px;
    font-weight: 500;
}

.back-btn:hover {
    text-decoration: underline;
}
    </style>
</head>

<body>

    <div class="card">
        <a href="https://riju-web-dev.github.io/portfolio-website/project.html" class="back-btn">⬅ Back</a>
        <h2>Create Account</h2>

        <form>
            <label>Name:</label>
            <input type="text" placeholder="Enter Your Full Name" required>

            <label>Father's Name:</label>
            <input type="text" placeholder="Enter Your Father's Name" required>

            <label>Email ID:</label>
            <input type="email" placeholder="Enter Your Email" required>

            <label>Gender:</label>
            <div class="gender-options">
                <label><input type="radio" name="gender"> Male</label>
                <label><input type="radio" name="gender"> Female</label>
                <label><input type="radio" name="gender"> Other</label>
            </div>

            <label>Date of Birth:</label>
            <input type="date" required>

            <label>Password:</label>
            <input type="password" required>

            <label>Confirm Password:</label>
            <input type="password" required>

            <button type="submit">Sign Up</button>
        </form>
    </div>

</body>
</html>
