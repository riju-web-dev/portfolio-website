<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Validation</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #141e30, #243b55); /* same as portfolio */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.container {
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    width: 320px;
}


.input-box {
    position: relative;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    background: #222;
    color: white;
    border: 1px solid #555;
}
.eye-btn {
    position: absolute;
    right: 10px;
    top: 35px;
    cursor: pointer;
}

.error { color: red; }
.success { color: green; }

button {
    width: 100%;
    padding: 10px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #5a67d8;
}

.back {
    text-align: center;
    margin-top: 15px;
}

.back a {
    text-decoration: none;
    color: #667eea;
    font-weight: bold;
}

@media (max-width: 480px) {

    .container {
        width: 90%;
        padding: 20px;
    }

    h2 {
        font-size: 22px;
        text-align: center;
    }

    input {
        padding: 12px;
    }

    button {
        padding: 12px;
        font-size: 16px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h2>Create Account</h2>

    <form onsubmit="return validatePassword()">

        <div class="input-box">
            <label>Password:</label>
            <input type="password" id="password">
            <span class="eye-btn" onclick="togglePassword('password')">👁️</span>
        </div>

        <div class="input-box">
            <label>Confirm Password:</label>
            <input type="password" id="confirmPassword">
            <span class="eye-btn" onclick="togglePassword('confirmPassword')">👁️</span>
        </div>

        <p id="message"></p>

        <button type="submit">Submit</button>
    </form>

    <div class="back">
        <a href="https://riju-web-dev.github.io/portfolio-website/">⬅ Back to Portfolio</a>
    </div>

</div>

<script>
function togglePassword(id) {
    let input = document.getElementById(id);
    input.type = (input.type === "password") ? "text" : "password";
}

function validatePassword() {
    let pwd = document.getElementById("password").value;
    let confirmPwd = document.getElementById("confirmPassword").value;
    let message = document.getElementById("message");

    if (pwd === "" || confirmPwd === "") {
        message.textContent = "Both fields are required.";
        message.className = "error";
        return false;
    }

    if (pwd !== confirmPwd) {
        message.textContent = "Passwords do NOT match!";
        message.className = "error";
        return false;
    }

    message.textContent = "Passwords match!";
    message.className = "success";
    return true;
}
</script>

</body>
</html>
